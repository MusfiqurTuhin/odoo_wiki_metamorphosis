name: Build wiki

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate wiki from inventory
        run: python scripts/generate_wiki.py --inventory data/odoo_module_inventory.md

      - name: Build MkDocs site
        run: mkdocs build --strict

      - uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 14
