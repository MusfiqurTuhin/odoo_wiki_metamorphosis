site_name: Metamorphosis Module Wiki
site_description: Project and Odoo custom module inventory for delivery, reuse, and marketing
site_url: https://musfiqurtuhin.github.io/odoo_wiki_metamorphosis/
repo_url: https://github.com/metamorphosisbd/odoo_wiki_metamorphosis
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - How to Contribute: contributing.md
  - Projects:
      - Overview: projects/index.md
      - "Basb": projects/basb/index.md
      - "Precisiontex": projects/precisiontex-v19-custom/index.md
      - "Friendship NGO": projects/friendship_ngo_sh/index.md
