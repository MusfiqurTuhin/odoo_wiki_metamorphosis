      - "Adarsha Publication": projects/adarsha_publication/index.md
      - "Gronthik Publication": projects/gronthik_publication/index.md
      - "Shanta Life Style": projects/shanta_life_style_17/index.md
      - "Organik Chicken": projects/organik-chicken/index.md
      - "HAJ ERP": projects/haj_erp_custom/index.md
      - "Mm Project": projects/mm_project/index.md
      - "Agile Minds": projects/agile_minds_odoosh/index.md
      - "Verity One": projects/verity_one/index.md
      - "Curepoint": projects/curepoint/index.md
